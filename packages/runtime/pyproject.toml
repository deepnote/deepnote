[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deepnote-runtime"
version = "0.1.0"
description = "A fast runtime for executing .deepnote files"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
deepnote = "deepnote_runtime.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/deepnote_runtime"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
